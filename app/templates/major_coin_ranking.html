<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f4f6f8;
        color: #17202a;
      }
      body {
        margin: 0;
      }
      header {
        background: #ffffff;
        border-bottom: 1px solid #dde3ea;
      }
      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px 20px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      nav,
      .windows,
      .ranking-summary {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      button {
        border: 1px solid #c9d3df;
        background: #ffffff;
        border-radius: 6px;
        color: #1e2b37;
        cursor: pointer;
        font-size: 14px;
        padding: 8px 12px;
      }
      button.active {
        background: #0f766e;
        border-color: #0f766e;
        color: #ffffff;
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .summary-item {
        background: #ffffff;
        border: 1px solid #dde3ea;
        border-radius: 6px;
        color: #344054;
        font-size: 14px;
        padding: 8px 12px;
      }
      input {
        border: 1px solid #c9d3df;
        border-radius: 6px;
        font-size: 14px;
        min-width: 220px;
        padding: 9px 12px;
      }
      select {
        border: 1px solid #c9d3df;
        border-radius: 6px;
        font-size: 14px;
        min-width: 260px;
        padding: 9px 12px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
        border: 1px solid #dde3ea;
      }
      th,
      td {
        border-bottom: 1px solid #e6ebf0;
        font-size: 14px;
        padding: 10px 12px;
        text-align: right;
        white-space: nowrap;
      }
      th {
        background: #eef3f6;
        cursor: pointer;
        font-weight: 600;
      }
      th:first-child,
      td:first-child,
      th:nth-child(2),
      td:nth-child(2) {
        text-align: left;
      }
      .positive {
        color: #047857;
      }
      .negative {
        color: #b91c1c;
      }
      .muted {
        color: #667085;
      }
      .hidden {
        display: none;
      }
      .table-wrap {
        overflow-x: auto;
      }
      @media (max-width: 760px) {
        .bar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <h1>{{ title }}</h1>
        <nav aria-label="ranking navigation">
          <button type="button" onclick="location.href='/'">全币种</button>
          <button type="button" class="active view-menu" data-view="ranking">分钟排行</button>
          <button type="button" class="view-menu" data-view="daily-ranking">日排行</button>
          <button type="button" class="view-menu" data-view="minute-candles">分钟K线</button>
          <button type="button" class="view-menu" data-view="daily-candles">日K线</button>
        </nav>
      </div>
    </header>
    <main>
      <section id="ranking-view">
        <div class="toolbar">
          <div class="windows" id="windows"></div>
          <div class="ranking-summary" id="direction-summary"></div>
          <input id="search" placeholder="搜索合约，例如 BTC">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-key="rank">排名</th>
                <th data-key="inst_id">合约</th>
                <th data-key="direction">方向</th>
                <th data-key="abs_pct_change">涨跌幅</th>
                <th data-key="volume_quote">成交额 USDT</th>
                <th data-key="avg_minute_volume_quote">1m平均成交额 USDT</th>
                <th data-key="open_price">开始价</th>
                <th data-key="close_price">最新价</th>
                <th data-key="calculated_at">计算时间</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr><td colspan="9" class="muted">加载中</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="daily-ranking-view" class="hidden">
        <div class="toolbar">
          <div class="windows" id="daily-windows"></div>
          <div class="ranking-summary" id="daily-direction-summary"></div>
          <input id="daily-search" placeholder="搜索合约，例如 BTC">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-daily-key="rank">排名</th>
                <th data-daily-key="inst_id">合约</th>
                <th data-daily-key="direction">方向</th>
                <th data-daily-key="abs_pct_change">涨跌幅</th>
                <th data-daily-key="volume_quote">成交额 USDT</th>
                <th data-daily-key="avg_daily_volume_quote">1D平均成交额 USDT</th>
                <th data-daily-key="open_price">开始价</th>
                <th data-daily-key="close_price">最新价</th>
                <th data-daily-key="calculated_at">计算时间</th>
              </tr>
            </thead>
            <tbody id="daily-rows">
              <tr><td colspan="9" class="muted">加载中</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="minute-candles-view" class="hidden">
        <div class="toolbar">
          <select id="minute-candle-inst"></select>
          <button type="button" id="load-minute-candles">查询</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>开盘价</th>
                <th>最高价</th>
                <th>最低价</th>
                <th>收盘价</th>
                <th>涨跌额</th>
                <th>涨跌幅</th>
                <th>振幅</th>
                <th>成交额 USDT</th>
                <th>是否确认</th>
                <th>写入时间</th>
              </tr>
            </thead>
            <tbody id="minute-candle-rows">
              <tr><td colspan="11" class="muted">请选择合约</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="daily-candles-view" class="hidden">
        <div class="toolbar">
          <select id="daily-candle-inst"></select>
          <button type="button" id="load-daily-candles">查询</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>开盘价</th>
                <th>最高价</th>
                <th>最低价</th>
                <th>收盘价</th>
                <th>涨跌额</th>
                <th>涨跌幅</th>
                <th>振幅</th>
                <th>成交额 USDT</th>
                <th>是否确认</th>
                <th>写入时间</th>
              </tr>
            </thead>
            <tbody id="daily-candle-rows">
              <tr><td colspan="11" class="muted">请选择合约</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script>
      const windows = ["1m", "5m", "15m", "30m"];
      const dailyWindows = ["1d", "5d", "15d", "30d"];
      let currentView = "ranking";
      let currentWindow = "30m";
      let currentDailyWindow = "30d";
      let rows = [];
      let dailyRows = [];
      let sortKey = "abs_pct_change";
      let dailySortKey = "abs_pct_change";
      let sortDirection = "desc";
      let dailySortDirection = "desc";
      let majorCoinInstIds = [];
      let minuteCandlesLoaded = false;
      let dailyCandlesLoaded = false;

      const fmtNumber = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 4 });
      const fmtVolume = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });

      function renderWindowButtons() {
        const container = document.getElementById("windows");
        container.innerHTML = "";
        for (const item of windows) {
          const button = document.createElement("button");
          button.textContent = item;
          button.className = item === currentWindow ? "active" : "";
          button.onclick = () => {
            currentWindow = item;
            renderWindowButtons();
            loadRows();
          };
          container.appendChild(button);
        }
      }

      function renderDailyWindowButtons() {
        const container = document.getElementById("daily-windows");
        container.innerHTML = "";
        for (const item of dailyWindows) {
          const button = document.createElement("button");
          button.textContent = item;
          button.className = item === currentDailyWindow ? "active" : "";
          button.onclick = () => {
            currentDailyWindow = item;
            renderDailyWindowButtons();
            loadDailyRows();
          };
          container.appendChild(button);
        }
      }

      async function loadRows() {
        if (currentView !== "ranking") return;
        const response = await fetch(`/api/major-coins/rankings/change?window=${currentWindow}&limit=200`);
        const payload = await response.json();
        rows = payload.data || [];
        renderDirectionSummary(payload.direction_counts || {});
        renderRows();
      }

      async function loadDailyRows() {
        if (currentView !== "daily-ranking") return;
        const response = await fetch(`/api/major-coins/daily-rankings/change?window=${currentDailyWindow}&limit=200`);
        const payload = await response.json();
        majorCoinInstIds = payload.configured_inst_ids || majorCoinInstIds;
        dailyRows = payload.data || [];
        renderDailyDirectionSummary(payload.direction_counts || {});
        renderDailyRows();
      }

      function renderDirectionSummary(counts) {
        const container = document.getElementById("direction-summary");
        const longCount = counts.long || 0;
        const shortCount = counts.short || 0;
        const totalCount = counts.total || longCount + shortCount;
        container.innerHTML = `
          <span class="summary-item">${currentWindow} 多方 ${longCount}</span>
          <span class="summary-item">${currentWindow} 空方 ${shortCount}</span>
          <span class="summary-item">合计 ${totalCount}</span>
        `;
      }

      function renderDailyDirectionSummary(counts) {
        const container = document.getElementById("daily-direction-summary");
        const longCount = counts.long || 0;
        const shortCount = counts.short || 0;
        const totalCount = counts.total || longCount + shortCount;
        container.innerHTML = `
          <span class="summary-item">${currentDailyWindow} 多方 ${longCount}</span>
          <span class="summary-item">${currentDailyWindow} 空方 ${shortCount}</span>
          <span class="summary-item">合计 ${totalCount}</span>
        `;
      }

      function renderRows() {
        const keyword = document.getElementById("search").value.trim().toUpperCase();
        const tbody = document.getElementById("rows");
        const filtered = rows
          .filter(row => !keyword || row.inst_id.includes(keyword))
          .sort((a, b) => compare(a[sortKey], b[sortKey]));

        tbody.innerHTML = "";
        if (!filtered.length) {
          tbody.innerHTML = '<tr><td colspan="9" class="muted">暂无数据</td></tr>';
          return;
        }

        for (const row of filtered) {
          const changeClass = row.direction === "short" ? "negative" : "positive";
          const directionLabel = row.direction === "short" ? "空" : "多";
          const directionClass = row.direction === "short" ? "negative" : "positive";
          const displayPctChange = row.abs_pct_change ?? Math.abs(row.pct_change || 0);
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.rank}</td>
            <td>${row.inst_id}</td>
            <td class="${directionClass}">${directionLabel}</td>
            <td class="${changeClass}">${fmtNumber.format(displayPctChange)}%</td>
            <td>${fmtVolume.format(row.volume_quote || 0)}</td>
            <td>${fmtVolume.format(row.avg_minute_volume_quote || 0)}</td>
            <td>${fmtNumber.format(row.open_price)}</td>
            <td>${fmtNumber.format(row.close_price)}</td>
            <td>${formatTime(row.calculated_at)}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      function renderDailyRows() {
        const keyword = document.getElementById("daily-search").value.trim().toUpperCase();
        const tbody = document.getElementById("daily-rows");
        const filtered = dailyRows
          .filter(row => !keyword || row.inst_id.includes(keyword))
          .sort((a, b) => compareByDirection(a[dailySortKey], b[dailySortKey], dailySortDirection));

        tbody.innerHTML = "";
        if (!filtered.length) {
          tbody.innerHTML = '<tr><td colspan="9" class="muted">暂无数据</td></tr>';
          return;
        }

        for (const row of filtered) {
          const changeClass = row.direction === "short" ? "negative" : "positive";
          const directionLabel = row.direction === "short" ? "空" : "多";
          const directionClass = row.direction === "short" ? "negative" : "positive";
          const displayPctChange = row.abs_pct_change ?? Math.abs(row.pct_change || 0);
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.rank}</td>
            <td>${row.inst_id}</td>
            <td class="${directionClass}">${directionLabel}</td>
            <td class="${changeClass}">${fmtNumber.format(displayPctChange)}%</td>
            <td>${fmtVolume.format(row.volume_quote || 0)}</td>
            <td>${fmtVolume.format(row.avg_daily_volume_quote || 0)}</td>
            <td>${fmtNumber.format(row.open_price)}</td>
            <td>${fmtNumber.format(row.close_price)}</td>
            <td>${formatTime(row.calculated_at)}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      async function loadMajorCoinInstIds() {
        if (majorCoinInstIds.length) return majorCoinInstIds;
        const response = await fetch("/api/major-coins/rankings/change?window=30m&limit=1");
        const payload = await response.json();
        majorCoinInstIds = payload.configured_inst_ids || [];
        return majorCoinInstIds;
      }

      async function fillCandleSelect(selectId) {
        const select = document.getElementById(selectId);
        const instruments = await loadMajorCoinInstIds();
        select.innerHTML = "";
        for (const instId of instruments) {
          const option = document.createElement("option");
          option.value = instId;
          option.textContent = instId;
          select.appendChild(option);
        }
        const defaultInst = instruments.includes("BTC-USDT-SWAP") ? "BTC-USDT-SWAP" : instruments[0];
        if (defaultInst) select.value = defaultInst;
        return defaultInst;
      }

      async function loadMinuteCandleView() {
        if (!minuteCandlesLoaded) {
          minuteCandlesLoaded = true;
          await fillCandleSelect("minute-candle-inst");
        }
        loadMinuteCandles();
      }

      async function loadDailyCandleView() {
        if (!dailyCandlesLoaded) {
          dailyCandlesLoaded = true;
          await fillCandleSelect("daily-candle-inst");
        }
        loadDailyCandles();
      }

      async function loadMinuteCandles() {
        const instId = document.getElementById("minute-candle-inst").value;
        if (!instId) {
          renderCandleRows("minute-candle-rows", []);
          return;
        }
        const response = await fetch(`/api/major-coins/candles?inst_id=${encodeURIComponent(instId)}&limit=30`);
        const payload = await response.json();
        renderCandleRows("minute-candle-rows", payload.data || []);
      }

      async function loadDailyCandles() {
        const instId = document.getElementById("daily-candle-inst").value;
        if (!instId) {
          renderCandleRows("daily-candle-rows", []);
          return;
        }
        const response = await fetch(`/api/major-coins/daily-candles?inst_id=${encodeURIComponent(instId)}&limit=30`);
        const payload = await response.json();
        renderCandleRows("daily-candle-rows", payload.data || []);
      }

      function renderCandleRows(tbodyId, candles) {
        const tbody = document.getElementById(tbodyId);
        tbody.innerHTML = "";
        if (!candles.length) {
          tbody.innerHTML = '<tr><td colspan="11" class="muted">暂无K线数据</td></tr>';
          return;
        }
        for (const row of candles) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${formatMsTime(row.ts)}</td>
            <td>${fmtNumber.format(row.open)}</td>
            <td>${fmtNumber.format(row.high)}</td>
            <td>${fmtNumber.format(row.low)}</td>
            <td>${fmtNumber.format(row.close)}</td>
            <td class="${valueClass(row.price_change)}">${fmtNumber.format(row.price_change || 0)}</td>
            <td class="${valueClass(row.pct_change)}">${formatPercent(row.pct_change)}</td>
            <td>${formatPercent(row.amplitude)}</td>
            <td>${fmtVolume.format(row.volume_quote || 0)}</td>
            <td>${row.confirmed ? "是" : "否"}</td>
            <td>${formatTime(row.fetched_at)}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      function setView(view) {
        currentView = view;
        document.querySelectorAll(".view-menu").forEach(item => {
          item.classList.toggle("active", item.dataset.view === view);
        });
        document.getElementById("ranking-view").classList.toggle("hidden", view !== "ranking");
        document.getElementById("daily-ranking-view").classList.toggle("hidden", view !== "daily-ranking");
        document.getElementById("minute-candles-view").classList.toggle("hidden", view !== "minute-candles");
        document.getElementById("daily-candles-view").classList.toggle("hidden", view !== "daily-candles");
        if (view === "daily-ranking") {
          loadDailyRows();
          return;
        }
        if (view === "minute-candles") {
          loadMinuteCandleView();
          return;
        }
        if (view === "daily-candles") {
          loadDailyCandleView();
          return;
        }
        loadRows();
      }

      function compare(a, b) {
        return compareByDirection(a, b, sortDirection);
      }

      function compareByDirection(a, b, direction) {
        if (typeof a === "string") {
          return direction === "asc" ? a.localeCompare(b) : b.localeCompare(a);
        }
        return direction === "asc" ? (a || 0) - (b || 0) : (b || 0) - (a || 0);
      }

      function valueClass(value) {
        if ((value || 0) < 0) return "negative";
        if ((value || 0) > 0) return "positive";
        return "";
      }

      function formatTime(seconds) {
        if (!seconds) return "";
        return new Date(seconds * 1000).toLocaleString("zh-CN", { hour12: false });
      }

      function formatMsTime(milliseconds) {
        if (!milliseconds) return "";
        return new Date(milliseconds).toLocaleString("zh-CN", { hour12: false });
      }

      function formatPercent(value) {
        if (value === null || value === undefined) return "";
        return `${fmtNumber.format(value)}%`;
      }

      document.getElementById("search").addEventListener("input", renderRows);
      document.getElementById("daily-search").addEventListener("input", renderDailyRows);
      document.getElementById("load-minute-candles").addEventListener("click", loadMinuteCandles);
      document.getElementById("minute-candle-inst").addEventListener("change", loadMinuteCandles);
      document.getElementById("load-daily-candles").addEventListener("click", loadDailyCandles);
      document.getElementById("daily-candle-inst").addEventListener("change", loadDailyCandles);
      document.querySelectorAll(".view-menu").forEach(button => {
        button.addEventListener("click", () => setView(button.dataset.view));
      });
      document.querySelectorAll("th").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (!key) return;
          sortDirection = sortKey === key && sortDirection === "desc" ? "asc" : "desc";
          sortKey = key;
          renderRows();
        });
      });
      document.querySelectorAll("th[data-daily-key]").forEach(th => {
        th.addEventListener("click", () => {
          const key = th.dataset.dailyKey;
          dailySortDirection = dailySortKey === key && dailySortDirection === "desc" ? "asc" : "desc";
          dailySortKey = key;
          renderDailyRows();
        });
      });

      renderWindowButtons();
      renderDailyWindowButtons();
      setView("ranking");
      setInterval(loadRows, 10000);
      setInterval(loadDailyRows, 10000);
    </script>
  </body>
</html>
